name: Despliegue a Vultr VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Ejecutar comandos via SSH con Llave Privada
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            mkdir -p /opt/listasPP
            cd /opt/listasPP
            if [ ! -d ".git" ]; then
              git clone https://github.com/KATUNLABU/listasPP.git .
            else
              git pull origin main
            fi
            docker-compose up -d --build
